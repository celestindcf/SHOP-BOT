<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RP Shop — Panel Vendeur</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0b0f14;color:#e0e0e0;font-family:'Segoe UI',sans-serif;padding:20px}
    .container{max-width:1400px;margin:0 auto}
    h1{color:#ff4757;margin-bottom:10px}
    h2{color:#a29bfe;margin-bottom:15px;font-size:18px}
    .card{background:#141a24;border:1px solid #1e2535;border-radius:8px;padding:20px;margin-bottom:20px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;text-align:left;border-bottom:1px solid #1e2535}
    th{color:#4a5568;font-size:11px;text-transform:uppercase}
    .status{display:inline-block;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:bold}
    .status.en_attente{background:#ffd32a22;color:#ffd32a}
    .status.validee{background:#2ed57322;color:#2ed573}
    .status.livree{background:#5352ed22;color:#a29bfe}
    .status.refusee{background:#ff475722;color:#ff4757}
    button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;margin-right:5px;font-size:12px}
    .btn-success{background:#2ed573;color:#000}
    .btn-danger{background:#ff4757;color:#fff}
    .btn-primary{background:#5352ed;color:#fff}
    .btn-warning{background:#ff9f43;color:#000}
    .flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .tabs{display:flex;gap:5px;margin-bottom:20px}
    .tab{padding:10px 20px;background:#1a1f2a;border:none;color:#e0e0e0;cursor:pointer;border-radius:6px 6px 0 0}
    .tab.active{background:#5352ed}
    input,select,textarea{width:100%;padding:12px;background:#1a1f2a;border:1px solid #1e2535;border-radius:6px;color:#fff;margin-bottom:15px}
  </style>
</head>
<body>
  <div id="app">
    <div class="container">
      <h1>🛡️ Panel Vendeur — RP Shop</h1>
      
      <div class="tabs">
        <button class="tab active" onclick="showTab('orders')">📋 Commandes</button>
        <button class="tab" onclick="showTab('catalogue')">📦 Catalogue</button>
      </div>
      
      <div id="tab-orders">
        <div class="flex" style="margin-bottom:15px">
          <select id="status-filter" onchange="loadOrders()" style="width:200px;margin-bottom:0">
            <option value="">Toutes</option>
            <option value="en_attente">🟡 En attente</option>
            <option value="validee">🟢 Validées</option>
            <option value="livree">✅ Livrées</option>
            <option value="refusee">🔴 Refusées</option>
          </select>
        </div>
        <div class="card">
          <table id="orders-table">
            <thead><tr><th>ID</th><th>Client</th><th>Articles</th><th>Détails</th><th>Date</th><th>Statut</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      
      <div id="tab-catalogue" style="display:none">
        <div class="flex" style="margin-bottom:15px">
          <button class="btn-primary" onclick="openAddModal()">➕ Nouvel article</button>
        </div>
        <div class="card">
          <table id="shop-table">
            <thead><tr><th>Image</th><th>Nom</th><th>Catégorie</th><th>Prix</th><th>Description</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  
  <div id="add-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:1000">
    <div style="background:#141a24;padding:25px;border-radius:8px;max-width:500px;width:90%">
      <h3 style="margin-bottom:20px;color:#a29bfe">➕ Ajouter un article</h3>
      <input type="text" id="item-nom" placeholder="Nom *">
      <input type="text" id="item-categorie" placeholder="Catégorie *">
      <input type="number" id="item-prix" placeholder="Prix (optionnel)">
      <textarea id="item-desc" placeholder="Description" rows="3"></textarea>
      <input type="text" id="item-image" placeholder="URL Image (optionnel)">
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn-primary" onclick="addItem()">Ajouter</button>
        <button onclick="closeModal()" style="background:#1a1f2a;color:#fff">Annuler</button>
      </div>
    </div>
  </div>

  <script>
    const guildId = new URLSearchParams(location.search).get('guild') || '';
    let orders = [], items = [];
    
    async function loadOrders() {
      const res = await fetch(`/api/orders?guild=${guildId}`);
      orders = await res.json();
      const filter = document.getElementById('status-filter').value;
      let filtered = filter ? orders.filter(o => o.status === filter) : orders;
      const st = {'en_attente':'🟡 Attente','validee':'🟢 Validée','livree':'✅ Livrée','refusee':'🔴 Refusée'};
      document.querySelector('#orders-table tbody').innerHTML = filtered.map(o => `
        <tr><td><code>${o.orderId}</code></td><td>${o.userTag || o.userId}</td><td>${o.items.map(i => `${i.quantite}x ${i.nom}`).join('<br>')}</td><td>${o.details || '-'}</td><td>${new Date(o.createdAt).toLocaleDateString('fr-FR')}</td><td><span class="status ${o.status}">${st[o.status]}</span></td>
        <td>${o.status==='en_attente'?`<button class="btn-success" onclick="updateOrder('${o.orderId}','validee')">✅</button>`:''}${o.status==='validee'?`<button class="btn-primary" onclick="updateOrder('${o.orderId}','livree')">🚚</button>`:''}${o.status==='en_attente'?`<button class="btn-danger" onclick="refuseOrder('${o.orderId}')">❌</button>`:''}</td></tr>
      `).join('');
    }
    
    async function updateOrder(id, status) {
      await fetch(`/api/orders/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ guild: guildId, status }) });
      loadOrders();
    }
    
    async function refuseOrder(id) {
      const raison = prompt('Raison (optionnel) :') || 'Aucune';
      await fetch(`/api/orders/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ guild: guildId, status: 'refusee', raisonRefus: raison }) });
      loadOrders();
    }
    
    async function loadShop() {
      const res = await fetch(`/api/shop?guild=${guildId}`);
      items = await res.json();
      document.querySelector('#shop-table tbody').innerHTML = items.map(i => `
        <tr><td>${i.image ? `<img src="${i.image}" style="width:40px;height:40px;object-fit:cover;border-radius:4px">` : '📦'}</td><td><strong>${i.nom}</strong><br><code>${i.id}</code></td><td>${i.categorie||'-'}</td><td>${i.prix ? i.prix+'💰' : '-'}</td><td>${i.description||'-'}</td>
        <td><button class="btn-warning" onclick="editItem('${i.id}')">✏️</button><button class="btn-danger" onclick="deleteItem('${i.id}')">🗑️</button></td></tr>
      `).join('');
    }
    
    function showTab(t) {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('tab-orders').style.display = t === 'orders' ? 'block' : 'none';
      document.getElementById('tab-catalogue').style.display = t === 'catalogue' ? 'block' : 'none';
    }
    
    function openAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('add-modal').style.display = 'none'; }
    
    async function addItem() {
      const nom = document.getElementById('item-nom').value;
      const categorie = document.getElementById('item-categorie').value;
      if (!nom || !categorie) return alert('Nom et catégorie requis');
      await fetch('/api/shop', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guild: guildId, nom, categorie, prix: parseInt(document.getElementById('item-prix').value) || null, description: document.getElementById('item-desc').value, image: document.getElementById('item-image').value })
      });
      closeModal();
      loadShop();
    }
    
    async function deleteItem(id) {
      if (!confirm('Supprimer ?')) return;
      await fetch(`/api/shop/${id}?guild=${guildId}`, { method: 'DELETE' });
      loadShop();
    }
    
    function editItem(id) {
      const item = items.find(i => i.id === id);
      const prix = prompt('Prix :', item.prix || '');
      const desc = prompt('Description :', item.description || '');
      const cat = prompt('Catégorie :', item.categorie || '');
      const upd = {};
      if (priz !== null && prix !== '') upd.prix = parseInt(prix) || null;
      if (desc !== null) upd.description = desc;
      if (cat !== null && cat !== '') upd.categorie = cat;
      if (Object.keys(upd).length) {
        fetch(`/api/shop/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ guild: guildId, ...upd }) }).then(() => loadShop());
      }
    }
    
    loadOrders();
    loadShop();
  </script>
</body>
</html>
